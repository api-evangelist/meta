# Meta Graph API — Conceptual GraphQL Schema
#
# Source: https://developers.facebook.com/docs/graph-api/reference
# This SDL is a conceptual mapping of the Meta Graph API node/edge/field model
# onto standard GraphQL types. Meta's Graph API is not a native GraphQL endpoint
# but its graph-traversal design maps directly to GraphQL semantics.
#
# Version: v20+ (current as of 2026)

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar URL
scalar JSON

# ---------------------------------------------------------------------------
# Shared Enums
# ---------------------------------------------------------------------------

enum PrivacyValue {
  EVERYONE
  ALL_FRIENDS
  FRIENDS_OF_FRIENDS
  SELF
  CUSTOM
}

enum PublishStatus {
  PUBLISHED
  DRAFT
  SCHEDULED
  EXPIRED
}

enum MediaType {
  IMAGE
  VIDEO
  CAROUSEL_ALBUM
  REELS
  STORY
}

enum AdStatus {
  ACTIVE
  PAUSED
  DELETED
  ARCHIVED
  IN_PROCESS
  WITH_ISSUES
}

enum CampaignObjective {
  BRAND_AWARENESS
  REACH
  TRAFFIC
  ENGAGEMENT
  APP_INSTALLS
  VIDEO_VIEWS
  LEAD_GENERATION
  CONVERSIONS
  CATALOG_SALES
  STORE_TRAFFIC
  OUTCOME_AWARENESS
  OUTCOME_ENGAGEMENT
  OUTCOME_LEADS
  OUTCOME_SALES
  OUTCOME_TRAFFIC
  OUTCOME_APP_PROMOTION
}

enum MessagingType {
  RESPONSE
  UPDATE
  MESSAGE_TAG
}

enum WhatsAppMessageType {
  TEXT
  IMAGE
  AUDIO
  VIDEO
  DOCUMENT
  STICKER
  LOCATION
  CONTACTS
  INTERACTIVE
  TEMPLATE
  REACTION
}

enum EventRsvpStatus {
  ATTENDING
  MAYBE
  DECLINED
  NOT_REPLIED
}

# ---------------------------------------------------------------------------
# Pagination
# ---------------------------------------------------------------------------

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type PagingCursors {
  before: String!
  after: String!
}

type Paging {
  cursors: PagingCursors
  next: URL
  previous: URL
}

# ---------------------------------------------------------------------------
# Privacy
# ---------------------------------------------------------------------------

type Privacy {
  value: PrivacyValue!
  description: String
  friends: String
  networks: String
  deny: String
  allow: String
}

# ---------------------------------------------------------------------------
# Root Query
# ---------------------------------------------------------------------------

type Query {
  # Authenticated user node
  me: User

  # Any node by globally unique ID
  node(id: ID!): Node

  # Page node
  page(id: ID!): Page

  # Group node
  group(id: ID!): Group

  # Event node
  event(id: ID!): Event

  # Ad account
  adAccount(id: ID!): AdAccount

  # Campaign
  campaign(id: ID!): Campaign

  # Instagram account
  instagramAccount(id: ID!): InstagramAccount

  # WhatsApp business account
  whatsAppAccount(id: ID!): WhatsAppAccount

  # Threads user
  threadsUser(id: ID!): ThreadsUser

  # Application
  application(id: ID!): Application

  # Catalog
  catalog(id: ID!): Catalog

  # Commerce order
  commerceOrder(id: ID!): CommerceOrder

  # Search
  search(q: String!, type: String, fields: String, limit: Int, after: String): SearchResultConnection
}

# ---------------------------------------------------------------------------
# Node Interface
# ---------------------------------------------------------------------------

interface Node {
  id: ID!
}

