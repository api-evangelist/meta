apis:
  - aid: meta:facebook-graph-api-user
    name: Facebook Graph API - User
    description: >-
      Retrieve and manage Facebook user profiles, friends lists, and account
      data using the Graph API User node.
    humanURL: https://developers.facebook.com/docs/graph-api/reference/user/
    tags:
      - Facebook
      - Social
      - Users
  - aid: meta:instagram-graph-api-user
    name: Instagram Graph API - User
    description: >-
      Access Instagram user profiles, media, and account information for
      Business and Creator accounts via the Instagram Graph API.
    humanURL: https://developers.facebook.com/docs/instagram-platform
    tags:
      - Instagram
      - Social
      - Users
  - aid: meta:facebook-graph-api-page
    name: Facebook Graph API - Page
    description: >-
      Access and manage Facebook Page settings, content, posts, and metrics using
      the Graph API Page node.
