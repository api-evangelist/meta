  - aid: meta:threads-api
    name: Threads API
    description: >-
      Create and manage content, retrieve profiles, and access insights on Meta's
      Threads social media platform.
    humanURL: https://developers.facebook.com/docs/threads
    tags:
      - Social
      - Social Media
      - Threads
  - aid: meta:instagram-graph-api-content-publishing
    name: Instagram Graph API - Content Publishing
    description: >-
      Publish photos, videos, carousels, reels, and stories to Instagram Business
      and Creator accounts programmatically.
    humanURL: >-
      https://developers.facebook.com/docs/instagram-platform/instagram-api-with-facebook-login/content-publishing
    tags:
      - Media
      - Publishing
      - Social
  - aid: meta:instagram-messaging-api
    name: Instagram Messaging API
    description: >-
      Send and receive messages on Instagram using the Messenger Platform,
      enabling customer service and automated messaging for Business accounts.
    humanURL: https://developers.facebook.com/docs/messenger-platform/instagram
    tags:
      - Instagram
      - Messaging
      - Social
  - aid: meta:meta-content-library-api
    name: Meta Content Library API
    description: >-
      Programmatic access to the full public content archive from Facebook,
      Instagram, and Threads for qualified academic and non-profit researchers.
    humanURL: https://developers.facebook.com/docs/content-library-and-api
    tags:
      - Analytics
      - Content
      - Research
  - aid: meta:llama-api
    name: Meta Llama API
    description: >-
      Access Meta's Llama large language models including Llama 4 and Llama 3
      family for building AI-powered applications via a hosted API.
    humanURL: https://llama.developer.meta.com/docs/overview
    tags:
      - Artificial Intelligence
      - Large Language Models
      - Machine Learning
    properties:
      - url: https://llama.developer.meta.com/docs/quickstart
        type: Getting Started
      - url: https://llama.developer.meta.com/docs/models
        type: Reference
      - url: https://llama.developer.meta.com/docs/sdks
        type: SDKs
      - url: https://llama.developer.meta.com/docs/api-keys
        type: Authentication
