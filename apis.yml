      - url: https://developers.facebook.com/docs/marketing-api/get-started
        type: Getting Started
  - aid: meta:conversions-api
    name: Meta Conversions API
    description: >-
      Send web, app, and offline conversion events directly from your server to
      Meta for improved ad measurement and optimization.
    humanURL: https://developers.facebook.com/docs/marketing-api/conversions-api
    tags:
      - Advertising
      - Analytics
      - Conversions
  - aid: meta:ad-library-api
    name: Meta Ad Library API
    description: >-
      Search and retrieve publicly visible ads across Meta platforms for
      transparency and research purposes via the ads_archive Graph API endpoint.
    humanURL: https://developers.facebook.com/docs/graph-api/reference/ads_archive/
    tags:
      - Advertising
      - Research
      - Transparency
  - aid: meta:whatsapp-cloud-api
    name: WhatsApp Cloud API
    description: >-
      Send and receive messages, manage phone numbers, and build messaging
      experiences on WhatsApp using Meta's cloud-hosted API.
    humanURL: https://developers.facebook.com/docs/whatsapp/cloud-api
    tags:
      - Cloud
      - Messaging
      - WhatsApp
    properties:
      - url: https://developers.facebook.com/docs/whatsapp/cloud-api/reference
