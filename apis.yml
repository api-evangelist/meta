    tags:
      - Events
      - Facebook
      - Social
  - aid: meta:facebook-marketing-api
    name: Facebook Marketing API
    description: >-
      Create, manage, and optimize advertising campaigns across Facebook,
      Instagram, and Audience Network programmatically.
    humanURL: https://developers.facebook.com/docs/marketing-api
    tags:
      - Advertising
      - Facebook
      - Marketing
